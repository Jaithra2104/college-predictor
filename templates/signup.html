<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up - Smart Rank</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Google Font: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Navbar Styling */
    .navbar-custom {
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }
    .navbar-custom .navbar-brand {
      display: flex;
      align-items: center;
    }
    .navbar-logo {
      width: 40px;
      height: 40px;
      margin-right: 10px;
    }
    .navbar-brand-title {
      font-weight: 700;
      font-size: 2rem;
      color: #FBBF24; /* Amber/gold */
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
    }

    /* Glassmorphism Form Container */
    .form-container {
      max-width: 500px;
      background: rgba(31, 41, 55, 0.45); /* Translucent dark gray */
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin: 80px auto;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: #fff;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 700;
      color: #FBBF24;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.25);
    }
    .form-label {
      font-weight: 500;
      color: #e5e7eb;
      margin-bottom: 8px;
    }
    .input-group-text {
      background-color: rgba(17, 24, 39, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px 0 0 10px;
      color: #FBBF24;
      min-width: 46px;
      justify-content: center;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      background-color: rgba(17, 24, 39, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-left: none;
      border-radius: 0 10px 10px 0;
      padding: 12px;
      width: 100%;
      color: #fff !important;
      transition: all 0.3s ease;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.35) !important;
    }
    input:focus {
      background-color: rgba(17, 24, 39, 0.7) !important;
      border-color: #FBBF24 !important;
      box-shadow: 0 0 10px rgba(251, 191, 36, 0.35) !important;
      outline: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #FBBF24 0%, #D97706 100%);
      border: none;
      padding: 14px 0;
      border-radius: 10px;
      width: 100%;
      font-size: 17px;
      font-weight: 600;
      margin-top: 15px;
      color: #111827;
      box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: #111827;
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.55);
    }
    .auth-links {
      text-align: center;
      margin-top: 20px;
      color: #9ca3af;
    }
    .auth-links a {
      color: #FBBF24;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .auth-links a:hover {
      color: #f59e0b;
      text-decoration: underline;
    }
    /* Footer */
    .footer {
      text-align: center;
      margin-top: auto;
      font-size: 0.9rem;
      color: #9ca3af;
      padding: 30px 0;
      background: #030712;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <!-- Optional Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="#">
        <svg class="navbar-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#004080; stop-opacity:1" />
              <stop offset="100%" style="stop-color:#0074D9; stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="100" cy="100" r="90" fill="url(#grad1)" />
          <text x="100" y="115" font-family="Poppins, sans-serif" font-size="50" fill="#ffffff" text-anchor="middle" font-weight="bold">SR</text>
        </svg>
      </a>
      <span class="navbar-brand-title">Smart Rank</span>
    </div>
  </nav>

  <!-- Sign Up Form Container -->
  <div class="container form-container">
    <h2 class="text-center">Sign Up</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('signup') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Username:</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
          <input type="text" class="form-control" name="username" id="username" required placeholder="Enter your username">
        </div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" class="form-control" name="email" id="email" required placeholder="Enter your email">
        </div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password:</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control" name="password" id="password" required placeholder="Enter your password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
    <div class="auth-links">
      <!-- Link to index route ("/" or "/home") for logging in, not "login" -->
      <p>Already have an account? <a href="{{ url_for('home') }}">Login here</a>.</p>
    </div>
  </div>

  <!-- Footer (Optional) -->
  <footer class="footer">
    <p>&copy; 2023 Smart Rank. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
