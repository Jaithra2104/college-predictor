<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Finder - Results</title>

    <!-- Google Fonts & Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(120deg, #1e3c72, #2a5298); /* New Blue Gradient */
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .navbar .logo {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 10px 20px;
            transition: 0.3s ease;
        }

        .navbar a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 80px 20px;
            background: url('https://source.unsplash.com/1600x900/?university,college') center/cover no-repeat;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            animation: fadeIn 1.5s ease-in-out;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: bold;
        }

        .hero p {
            font-size: 20px;
            margin-top: 10px;
        }

        /* College List */
        .college-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 50px 20px;
            width: 90%;
            max-width: 1200px;
            margin: auto;
            animation: fadeInUp 1.5s ease-in-out;
        }

        .college-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: 0.4s ease-in-out;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 1s ease-in-out forwards;
        }

        .college-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.2);
        }

        .college-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 50%;
            border: 3px solid white;
        }

        .college-card h2 {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        .college-card h2 a {
            color: white;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .college-card h2 a:hover {
            color: #ffcc00;
            text-decoration: underline;
        }

        .college-card p {
            font-size: 16px;
            color: #f0f0f0;
            margin: 5px 0;
        }

        /* Footer */
        .footer {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            text-align: center;
            color: white;
            font-size: 14px;
            margin-top: 50px;
        }

        .footer-icons {
            margin-top: 10px;
        }

        .footer-icons a {
            color: white;
            margin: 0 10px;
            font-size: 22px;
            transition: 0.3s ease;
        }

        .footer-icons a:hover {
            color: #ffcc00;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">College Finder</div>
        <div>
            <a href="/">Home</a>
            <a href="#">About Us</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Explore the Best Colleges</h1>
        <p>Find the perfect match for your rank and location</p>
    </div>

    <!-- College Listings -->
    <div class="college-container" id="collegeContainer">
        {% for college in colleges %}
        <div class="college-card">
            <img src="{{ college.image_url }}" alt="{{ college.name }} Logo" class="college-logo">
            <h2><a href="{{ college.official_website }}" target="_blank">{{ college.name }}</a></h2>
            <p><i class="fas fa-map-marker-alt"></i> {{ college.location }}</p>
            <p><i class="fas fa-bullseye"></i> Cutoff Rank: <strong>{{ college.cutoff_rank }}</strong></p>
        </div>
        {% endfor %}
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2025 College Finder</p>
    </div>

</body>
</html>
