<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up - Smart Rank</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Google Font: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* Global Styles */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1A237E, #3949AB); /* Elegant dark navy gradient */
      color: #fff;
    }
    /* (Optional) Navbar if you want consistent styling with index */
    .navbar-custom {
      background: rgba(0, 32, 64, 0.95);
      padding: 10px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .navbar-custom .navbar-brand {
      display: flex;
      align-items: center;
    }
    .navbar-logo {
      width: 40px;
      height: 40px;
      margin-right: 10px;
    }
    .navbar-brand-title {
      font-weight: 600;
      font-size: 1.8rem;
      color: #FBC02D; /* Gold accent */
    }
    /* Glassmorphism Form Container */
    .form-container {
      max-width: 500px;
      background: rgba(255, 255, 255, 0.85);
      margin: 80px auto;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      color: #002f5f;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      color: #002f5f;
    }
    .form-label {
      font-weight: 500;
      margin-bottom: 5px;
    }
    .input-group-text {
      background-color: rgba(255, 255, 255, 0.9);
      border: 1px solid #ccc;
      border-radius: 5px 0 0 5px;
      color: #002f5f;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      border: 1px solid #ccc;
      border-left: none;
      border-radius: 0 5px 5px 0;
      padding: 10px;
      width: 100%;
      transition: border-color 0.2s ease;
      color: #002f5f;
    }
    input:focus {
      box-shadow: none;
      outline: none;
      border-color: #002f5f !important;
    }
    .btn-primary {
      background-color: #FBC02D;
      border: none;
      padding: 12px 0;
      border-radius: 5px;
      width: 100%;
      font-size: 16px;
      margin-top: 15px;
      transition: background 0.3s ease;
      color: #fff;
    }
    .btn-primary:hover {
      background-color: #D68910;
    }
    .auth-links {
      text-align: center;
      margin-top: 15px;
    }
    .auth-links a {
      text-decoration: none;
      color: #002f5f;
      margin: 0 10px;
      transition: color 0.3s ease;
    }
    .auth-links a:hover {
      color: #001b3a;
    }
    /* Footer (Optional) */
    .footer {
      text-align: center;
      margin-top: 50px;
      font-size: 0.9rem;
      color: #ccc;
      padding: 20px 0;
      background: #0D47A1;
    }
  </style>
</head>
<body>
  <!-- Optional Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="#">
        <svg class="navbar-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#004080; stop-opacity:1" />
              <stop offset="100%" style="stop-color:#0074D9; stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="100" cy="100" r="90" fill="url(#grad1)" />
          <text x="100" y="115" font-family="Poppins, sans-serif" font-size="50" fill="#ffffff" text-anchor="middle" font-weight="bold">SR</text>
        </svg>
      </a>
      <span class="navbar-brand-title">Smart Rank</span>
    </div>
  </nav>

  <!-- Sign Up Form Container -->
  <div class="container form-container">
    <h2 class="text-center">Sign Up</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('signup') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Username:</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
          <input type="text" class="form-control" name="username" id="username" required placeholder="Enter your username">
        </div>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" class="form-control" name="email" id="email" required placeholder="Enter your email">
        </div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password:</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control" name="password" id="password" required placeholder="Enter your password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Sign Up</button>
    </form>
    <div class="auth-links">
      <!-- Link to index route ("/" or "/home") for logging in, not "login" -->
      <p>Already have an account? <a href="{{ url_for('home') }}">Login here</a>.</p>
    </div>
  </div>

  <!-- Footer (Optional) -->
  <footer class="footer">
    <p>&copy; 2023 Smart Rank. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
